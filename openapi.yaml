openapi: 3.1.1
info:
  title: FakeAPI Store
  version: 1.2.3
  description: |-
    This is a sample FakeAPI Store Server based on the OpenAPI 3.X specification. 
    You can find out more about Swagger at [https://swagger.io](https://swagger.io). In the third iteration 
    of the pet store, we've switched to the design first approach. 
    You can now help us improve the API whether it's by making changes to the definition 
    itself or to the code. That way, with time, we can improve the API in general, and 
    expose some of the new features in OAS3.
  termsOfService: https://terminos.com
  contact:
    name: alemanuel
    url: https://contacto.com
    email: alemanuel@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
externalDocs:
  description: Find out mor about FakeAPI Store
  url: https://github.com/platzi/curso-apifirst
tags:
  - name: users
    description: Operations related to users
  - name: products
    description: Operations related to products
    externalDocs: 
     description: Find out more about products
     url: https://openapi.com
servers:
  - url: http://localhost:{port}
    description: Version 1 de la API
    variables:
      port:
        default: "3005"
        description: Port number
  - url: http://localhost:{port}/v2
    description: Version 2 de la API
    variables:
      port:
        default: "3005"
        description: Port number
paths:
  /products:
    get:
      tags:
        - products
      summary: Get all products
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags:
        - products
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{id}:
    get:
      tags:
        - products
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    post:
      tags:
        - products
      summary: Update product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    delete:
      tags:
        - products
      summary: Delete product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /hello:
    get:
      summary: Get hello message
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HelloResponse'
  /users:
    post:
      tags:
        - users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - age
                - email
              properties:
                name:
                  type: string
                  minLength: 2
                age: 
                  type: integer
                  minimum: 18
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  age:
                    type: integer
                  email:
                    type: string
  /users/{id}:
    get:
      tags:
        - users 
      summary: Get userby id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name: 
                    type: string
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    post:
      tags:
        - users
      summary: Update usr by id
      parameters:
        - in: path
          name: id
          required: true
          schema: 
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - age
                - email
              properties:
                name:
                  type: string
                  minLength: 2
                age:
                  type: integer
                  minimum: 18
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  age:
                    type: integer
                  email:
                    type: string
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string


components:
  schemas:
    HelloResponse:
      type: object
      properties:
        message:
          type: string
          example: Hello World!
    Product:
      type: object
      required:
        - name
        - price
        - category
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          minLength: 2
          maxLength: 50
          example: "Sony WH-1000XM4"
        description:
          type: string
          maxLength: 500
          example: "Wireless noise-canceling headphones with premium sound quality and smart listening control."
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
          example: 348.00
        category:
          type: string
          enum: ["electronics", "books", "clothing", "food"]
          example: "electronics"
        tags:
          type: array
          items:
            type: string
          minItems: 1
          example: ["audio", "headphones", "wireless"]
        InStock:
          type: boolean
          example: true
        spacifications:
          type: object
          additionalProperties:
            type: string
          example:
            battery_life: "30 hours"
            connectivity: "Bluetooth 5.0"
            color: "Silver"
        ratings:
          type: array
          items:
            type: object
            required:
              - score
              - comment
            properties:
              score:
                type: integer
                minimum: 1
                maximum: 5
                example: 5
              comment:
                type: string
                maxLength: 200
                example: "Best noise-canceling headphones I have ever bought!"